name: convert_the_spire_reborn
description: >
  All-in-one media suite — download from 1800+ sites,
  convert 27+ formats, play, cast to DLNA/UPnP, and
  optionally share idle CPU for QUBIC rewards.
  Windows · Linux · Android. Built with Flutter.
publish_to: 'none'
version: 5.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  package_info_plus: ^8.1.3
  path_provider: ^2.1.2
  file_picker: ^10.3.10
  url_launcher: ^6.2.5
  youtube_explode_dart: ^3.0.0
  provider: ^6.0.5
  video_player: ^2.5.1
  archive: ^3.4.10
  image: ^4.3.0
  shared_preferences: any
  sqflite: any
  sqflite_common_ffi: any
  window_manager: any
  media_kit: any
  media_kit_video: any
  media_kit_libs_windows_video: ^1.0.9
  media_kit_libs_android_video: ^1.3.8
  media_kit_libs_linux: any
  media_kit_native_event_loop: ^1.0.2
  flutter_inappwebview: any
  share_plus: any
  just_audio: any
  audio_service: any
  video_thumbnail: any
  fl_chart: any
  battery_plus: any
  audio_metadata_reader: any
  csv: any
  pdf: any
  multicast_dns: any
  ffmpeg_kit_flutter_new: ^4.1.0
  flutter_local_notifications: any
  tray_manager: any

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/