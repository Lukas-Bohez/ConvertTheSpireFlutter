name: convert_the_spire_reborn
description: >
  All-in-one media suite — download from 1800+ sites,
  convert 27+ formats, play, cast to DLNA/UPnP, and
  optionally share idle CPU for QUBIC rewards.
  Windows · Linux · Android. Built with Flutter.
publish_to: 'none'
version: 5.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  package_info_plus: ^8.1.3
  path_provider: ^2.1.2
  file_picker: ^10.3.10
  url_launcher: ^6.2.5
  youtube_explode_dart: ^3.0.0
  provider: ^6.0.5
  video_player: ^2.5.1
  archive: ^3.4.10
  image: ^4.3.0
  shared_preferences: 2.5.4
  sqflite: 2.4.2
  sqflite_common_ffi: 2.4.0+2
  window_manager: 0.5.1
  media_kit: 1.2.6
  media_kit_video: 2.0.1
  media_kit_libs_windows_video: ^1.0.9
  media_kit_libs_android_video: ^1.3.8
  media_kit_libs_linux: 1.2.1
  media_kit_native_event_loop: ^1.0.2
  flutter_inappwebview: 6.1.5
  share_plus: 12.0.1
  just_audio: 0.10.5
  audio_service: 0.18.18
  video_thumbnail: 0.5.6
  fl_chart: 1.1.1
  battery_plus: 7.0.0
  audio_metadata_reader: 1.4.2
  csv: 7.2.0
  pdf: 3.11.3
  multicast_dns: 0.3.3
  ffmpeg_kit_flutter_new: ^4.1.0
  flutter_local_notifications: 21.0.0
  tray_manager: 0.5.2
  # Explicitly pinned transitive dependencies to avoid future resolution breakage
  crypto: ^3.0.3
  mime: ^2.0.0
  ffi: ^2.1.0
  uuid: ^4.5.1
  path: ^1.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/