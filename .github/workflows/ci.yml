name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # Code Quality - must pass before any builds proceed
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch inappwebview_windows source
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }
          $eph = "windows\flutter\ephemeral\.plugin_symlinks\flutter_inappwebview_windows\windows"
          if (Test-Path $eph) {
            Get-ChildItem $eph -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: |
          if [ -d "test" ] && find test -name "*_test.dart" -print -quit | grep -q .; then
            flutter test
          else
            echo "No test files found - skipping tests"
          fi

  # Build - Windows
  build-windows:
    name: Build Windows
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Verify dependencies resolve
        run: |
          echo "=== pubspec.yaml ==="
          cat pubspec.yaml || true
          echo "=== pubspec.lock (youtube_explode_dart) ==="
          grep "youtube_explode_dart" pubspec.lock || true
          echo "--- pub deps ---"
          flutter pub deps --no-dev || (echo "pub deps failed" && exit 1)

      - name: Build Windows release
        run: flutter build windows --release --no-tree-shake-icons

      - name: Verify libmpv-2.dll present
        shell: pwsh
        run: |
          $dll = "build\windows\x64\runner\Release\libmpv-2.dll"
          if (-not (Test-Path $dll)) {
            Write-Error "FATAL: libmpv-2.dll missing from release dir"
            exit 1
          }
          Write-Host "libmpv-2.dll confirmed present"

      - name: Package Windows release
        shell: pwsh
        run: |
          # Create the zip with the correct final name right here
          # so it never gets renamed or double-zipped by GitHub Actions
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "ConvertTheSpireReborn.zip" `
            -Force
          Write-Host "Created ConvertTheSpireReborn.zip"
          $size = (Get-Item "ConvertTheSpireReborn.zip").Length / 1MB
          Write-Host ("Size: {0:N1} MB" -f $size)

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release    # internal artifact name — doesn't matter
          path: ConvertTheSpireReborn.zip   # the file itself is named correctly
          if-no-files-found: error

  # ── Linux Build ──────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: quality
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04          # Build inside 20.04 so GLIBC ≤ 2.31
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl git unzip xz-utils zip \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libmpv-dev mpv libass-dev \
            libayatana-appindicator3-dev libappindicator3-dev \
            patchelf ca-certificates

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        run: |
          dir="${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows"
          if [ -d "$dir" ]; then
            find "$dir" -type f -name '*.cc' -exec sed -i 's/\bwebview_\b/view/g' {} +
          fi
          eph="windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          if [ -d "$eph" ]; then
            find "$eph" -type f -name '*.cc' -exec sed -i 's/\bwebview_\b/view/g' {} +
          fi

      - name: Build Linux release
        run: flutter build linux --release

      - name: Copy launcher into bundle
        run: |
          BUNDLE_DIR="build/linux/x64/release/bundle"
          cp linux/convert_the_spire.sh "$BUNDLE_DIR/"
          chmod +x "$BUNDLE_DIR/convert_the_spire.sh"

      - name: Verify no missing shared libs
        run: |
          BIN="build/linux/x64/release/bundle/convert_the_spire_reborn"
          # Install runtime GUI libs so ldd can resolve them (same libs users will have)
          apt-get install -y --no-install-recommends \
            libgtk-3-0 libglib2.0-0 libgdk-pixbuf2.0-0 \
            libpango-1.0-0 libcairo2 libatk1.0-0 libharfbuzz0b \
            libmpv1 libayatana-appindicator3-1 libepoxy0
          MISSING=$(ldd "$BIN" | grep "not found" || true)
          if [ -n "$MISSING" ]; then
            echo "ERROR: missing libraries:"
            echo "$MISSING"
            exit 1
          fi
          echo "All shared libraries resolved OK"

      - name: Archive Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/linux.zip" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: linux.zip

  # Build - Android
  build-android:
    name: Build Android
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Verify dependencies resolve
        run: |
          echo "=== pubspec.yaml ==="
          cat pubspec.yaml || true
          echo "=== pubspec.lock (youtube_explode_dart) ==="
          grep "youtube_explode_dart" pubspec.lock || true
          echo "--- pub deps ---"
          flutter pub deps --no-dev || (echo "pub deps failed" && exit 1)

      - name: Build Android APK (split per ABI)
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Rename APK to release name
        run: |
          # Copy arm64 APK to the correct release filename
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             ConvertTheSpireReborn.apk
          echo "Android artifact: ConvertTheSpireReborn.apk"
          ls -lh ConvertTheSpireReborn.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: ConvertTheSpireReborn.apk
          if-no-files-found: error

  # Release
  release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-files/

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-files/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-files/

      - name: Verify release files
        run: |
          echo "Release files:"
          ls -lh release-files/
          # Hard fail if any expected file is missing
          test -f release-files/ConvertTheSpireReborn.zip || (echo "MISSING: Windows zip" && exit 1)
          test -f release-files/ConvertTheSpireReborn.apk || (echo "MISSING: Android APK" && exit 1)
          test -f release-files/linux.zip                 || (echo "MISSING: Linux zip"   && exit 1)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          files: |
            release-files/ConvertTheSpireReborn.zip
            release-files/ConvertTheSpireReborn.apk
            release-files/linux.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}