name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # Code Quality - must pass before any builds proceed
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch inappwebview_windows source
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }
          $eph = "windows\flutter\ephemeral\.plugin_symlinks\flutter_inappwebview_windows\windows"
          if (Test-Path $eph) {
            Get-ChildItem $eph -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: |
          if [ -d "test" ] && find test -name "*_test.dart" -print -quit | grep -q .; then
            flutter test
          else
            echo "No test files found - skipping tests"
          fi

  # Build - Windows
  build-windows:
    name: Build Windows
    needs: quality
    runs-on: windows-2022   # pin to VS2022 to avoid plugin compile bug
    steps:
      - uses: actions/checkout@v4

      - name: Patch inappwebview_windows source
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }
          $eph = "windows\flutter\ephemeral\.plugin_symlinks\flutter_inappwebview_windows\windows"
          if (Test-Path $eph) {
            Get-ChildItem $eph -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                Set-Content $_.FullName
            }
          }

    - name: Build Windows release (with retry)
        shell: pwsh
        run: |
          $attempt = 0
          $max = 2
              while ($attempt -lt $max) {
            Write-Host "Windows build attempt $($attempt + 1) of $max"
            try {
                  flutter build windows --release --no-tree-shake-icons
              break
            } catch {
              Write-Host "Build failed: $_"
              $attempt++
              if ($attempt -lt $max) {
                Write-Host "Retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                throw
              }
            }
          }

      - name: Prepare artifact
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $dest = "releases\windows"
          if (-not (Test-Path $src)) { Write-Error "Windows release dir not found"; exit 1 }
          # Fail fast if libmpv-2.dll is missing from the release directory
          if (-not (Test-Path "$src\libmpv-2.dll")) { Write-Error "libmpv-2.dll not found in release dir. Build is broken."; exit 1 }
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Copy-Item "$src\*" $dest -Recurse

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: releases/windows/
          retention-days: 30

  # Build - Linux
  build-linux:
    name: Build Linux
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev mpv libass-dev \
            libayatana-appindicator3-dev

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release --no-tree-shake-icons

      - name: Check Linux shared libs
        run: |
          set -e
          echo "Checking for missing shared libraries in Linux bundle..."
          missing=$(ldd build/linux/x64/release/bundle/convert_the_spire_reborn | grep "not found" || true)
          if [ -n "$missing" ]; then
            echo "ERROR: Missing shared libraries detected:" >&2
            echo "$missing" >&2
            exit 1
          else
            echo "No missing shared libraries detected."
          fi

      - name: Prepare artifact
        run: |
          rm -rf releases/linux
          mkdir -p releases/linux
          cp -r build/linux/x64/release/bundle/* releases/linux/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: releases/linux/
          retention-days: 30

  # Build - Android
  build-android:
    name: Build Android
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode signing keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: env.KEYSTORE_PASSWORD != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      - name: Build Android APKs (split per ABI)
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Prepare artifact
        run: |
          rm -rf releases/android
          mkdir -p releases/android
          # Copy all split APKs produced by --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk releases/android/ || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk releases/android/ || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk releases/android/ || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: releases/android/
          retention-days: 30

  # Release - triggered on version tags (e.g. v3.0.3)
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package Windows release
        run: |
          cd artifacts/windows-release
          zip -r ../../ConvertTheSpireReborn.zip .

      - name: Package Linux release
        run: |
          cd artifacts/linux-release
          zip -r ../../linux.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Convert the Spire Reborn ${{ github.ref_name }}
          body: |
            ## Convert the Spire Reborn ${{ github.ref_name }}

            ### Downloads
            - **Windows** — extract `windows.zip` and run `convert_the_spire_reborn.exe`
            - **Linux** — extract `linux.zip` and run `convert_the_spire_reborn`
            - **Android** — install `ConvertTheSpireReborn.apk`
          draft: false
          prerelease: false
          files: |
            ConvertTheSpireReborn.zip
            linux.zip
            artifacts/android-release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
