name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v3.0.3). Leave empty to auto-generate.'
        required: false
      release_name:
        description: 'Release name. Leave empty to use tag.'
        required: false

permissions:
  contents: write

jobs:
  # ── Code quality gate ────────────────────────────────────────────────
  analyze:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: |
          if [ -d "test" ] && find test -name "*_test.dart" -print -quit | grep -q .; then
            flutter test
          else
            echo "No test files found - skipping tests"
          fi

  # ── Windows Build ────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\\bwebview_\\b','view' |
                Set-Content $_.FullName
            }
          }
          $eph = "windows\flutter\ephemeral\\.plugin_symlinks\flutter_inappwebview_windows\windows"
          if (Test-Path $eph) {
            Get-ChildItem $eph -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\\bwebview_\\b','view' |
                Set-Content $_.FullName
            }
          }

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows bundle
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ConvertTheSpireReborn.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ConvertTheSpireReborn.zip

  # ── Linux Build ──────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libgtk-3-dev clang \
            libasound2-dev libmpv-dev \
            libayatana-appindicator3-dev

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        run: |
          dir="${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows"
          if [ -d "$dir" ]; then
            find "$dir" -type f -name '*.cc' -exec sed -i 's/\\bwebview_\\b/view/g' {} +
          fi
          eph="windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          if [ -d "$eph" ]; then
            find "$eph" -type f -name '*.cc' -exec sed -i 's/\\bwebview_\\b/view/g' {} +
          fi

      - name: Build Linux release
        run: flutter build linux --release

      - name: Archive Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/linux.zip" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: linux.zip

  # ── Android Build ────────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        run: |
          dir="${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows"
          if [ -d "$dir" ]; then
            find "$dir" -type f -name '*.cc' -exec sed -i 's/\\bwebview_\\b/view/g' {} +
          fi
          eph="windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          if [ -d "$eph" ]; then
            find "$eph" -type f -name '*.cc' -exec sed -i 's/\\bwebview_\\b/view/g' {} +
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk ConvertTheSpireReborn.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ConvertTheSpireReborn.apk

  # ── Create / Update GitHub Release ──────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('v0.0.{0}', github.run_number) }}
          name: ${{ inputs.release_name || inputs.release_tag || format('Build {0}', github.run_number) }}
          generate_release_notes: true
          files: |
            artifacts/windows-x64/ConvertTheSpireReborn.zip
            artifacts/linux-x64/linux.zip
            artifacts/android-apk/ConvertTheSpireReborn.apk
