name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v3.0.3). Leave empty to auto-generate.'
        required: false
      release_name:
        description: 'Release name. Leave empty to use tag.'
        required: false

permissions:
  contents: write

jobs:
  # ── Code quality gate ────────────────────────────────────────────────
  analyze:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: |
          if [ -d "test" ] && find test -name "*_test.dart" -print -quit | grep -q .; then
            flutter test
          else
            echo "No test files found - skipping tests"
          fi

  # ── Build - Windows (copied from working CI job)
  build-windows:
    name: Build Windows
    needs: analyze
    runs-on: windows-2022   # pin to VS2022 to avoid plugin compile bug
    steps:
      - uses: actions/checkout@v4

      - name: Patch inappwebview_windows source
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\\bwebview_\\b','view' |
                Set-Content $_.FullName
            }
          }

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        shell: pwsh
        run: |
          $dir = "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
              (Get-Content $_.FullName) -replace '\\bwebview_\\b','view' |
                Set-Content $_.FullName
            }
          }

      - name: Build Windows release (with retry)
        shell: pwsh
        run: |
          $attempt = 0
          $max = 2
          while ($attempt -lt $max) {
            Write-Host "Windows build attempt $($attempt + 1) of $max"
            try {
              flutter build windows --release
              break
            } catch {
              Write-Host "Build failed: $_"
              $attempt++
              if ($attempt -lt $max) {
                Write-Host "Retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                throw
              }
            }
          }

      - name: Prepare artifact
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $zip = "ConvertTheSpireReborn.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          # Create a ZIP containing the release bundle (preserve structure)
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ConvertTheSpireReborn.zip
          retention-days: 30

  # ── Linux Build ──────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: analyze
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04          # Build inside 20.04 so GLIBC ≤ 2.31
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl git unzip xz-utils zip \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libmpv-dev mpv libass-dev \
            libayatana-appindicator3-dev libappindicator3-dev \
            patchelf ca-certificates

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        run: |
          dir="${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows"
          if [ -d "$dir" ]; then
            find "$dir" -type f -name '*.cc' -exec sed -i 's/\bwebview_\b/view/g' {} +
          fi
          eph="windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          if [ -d "$eph" ]; then
            find "$eph" -type f -name '*.cc' -exec sed -i 's/\bwebview_\b/view/g' {} +
          fi

      - name: Build Linux release
        run: flutter build linux --release

      - name: Copy launcher into bundle
        run: |
          BUNDLE_DIR="build/linux/x64/release/bundle"
          cp linux/convert_the_spire.sh "$BUNDLE_DIR/"
          chmod +x "$BUNDLE_DIR/convert_the_spire.sh"

      - name: Verify no missing shared libs
        run: |
          BIN="build/linux/x64/release/bundle/convert_the_spire_reborn"
          # Install runtime GUI libs so ldd can resolve them (same libs users will have)
          apt-get install -y --no-install-recommends \
            libgtk-3-0 libglib2.0-0 libgdk-pixbuf2.0-0 \
            libpango-1.0-0 libcairo2 libatk1.0-0 libharfbuzz0b \
            libmpv1 libayatana-appindicator3-1 libepoxy0
          MISSING=$(ldd "$BIN" | grep "not found" || true)
          if [ -n "$MISSING" ]; then
            echo "ERROR: missing libraries:"
            echo "$MISSING"
            exit 1
          fi
          echo "All shared libraries resolved OK"

      - name: Archive Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/linux.zip" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: linux.zip

  # ── Android Build ────────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows after pub get
        run: |
          dir="${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows"
          if [ -d "$dir" ]; then
            find "$dir" -type f -name '*.cc' -exec sed -i 's/\\bwebview_\\b/view/g' {} +
          fi
          eph="windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          if [ -d "$eph" ]; then
            find "$eph" -type f -name '*.cc' -exec sed -i 's/\\bwebview_\\b/view/g' {} +
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk ConvertTheSpireReborn.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ConvertTheSpireReborn.apk

  # ── Create / Update GitHub Release ──────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name || format('v0.0.{0}', github.run_number) }}
          name: ${{ inputs.release_name || inputs.release_tag || github.ref_name || format('Build {0}', github.run_number) }}
          generate_release_notes: true
          files: |
            artifacts/windows-x64/ConvertTheSpireReborn.zip
            artifacts/linux-x64/linux.zip
            artifacts/android-apk/ConvertTheSpireReborn.apk