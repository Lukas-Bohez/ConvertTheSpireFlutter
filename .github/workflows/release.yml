name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.2.3) — leave blank to auto-generate'
        required: false
        type: string
      release_name:
        description: 'Release title — leave blank to use the tag'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.41.2'
  APP_NAME: convert_the_spire_reborn
  OUTPUT_NAME: ConvertTheSpireReborn

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  build-windows:
    name: Build Windows
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows
        shell: bash
        run: |
          CACHE="${LOCALAPPDATA:-$USERPROFILE/AppData/Local}/Pub/Cache"
          for dir in \
            "$CACHE/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows" \
            "windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          do
            if [ -d "$dir" ]; then
              find "$dir" -type f -name '*.cc' -exec perl -pi -e 's/\bwebview_\b/view/g' {} +
              echo "Patched: $dir"
            fi
          done

      - name: Build Windows release
        run: flutter build windows --release --no-tree-shake-icons

      - name: Package Windows build
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (!(Test-Path $src)) { Write-Error "Not found: $src"; exit 1 }
          Compress-Archive -Path "$src\*" -DestinationPath "${{ env.OUTPUT_NAME }}-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ env.OUTPUT_NAME }}-windows.zip
          retention-days: 30

  build-linux:
    name: Build Linux
    needs: analyze
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --privileged
    defaults:
      run:
        shell: bash
    steps:
      - name: Configure git safe.directory
        run: printf '[safe]\n\tdirectory = *\n' > "$HOME/.gitconfig"

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: UTC
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl git unzip xz-utils zip jq perl \
            build-essential clang-10 clang++-10 llvm-10 lld-10 \
            cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libmpv-dev mpv libass-dev \
            libayatana-appindicator3-dev libappindicator3-dev \
            patchelf ca-certificates squashfs-tools file binutils python3
          ln -sf /usr/bin/clang-10   /usr/bin/clang   || true
          ln -sf /usr/bin/clang++-10 /usr/bin/clang++ || true
          ln -sf /usr/bin/lld-10     /usr/bin/lld     || true
          ls -la /usr/lib/llvm-10/bin/ld.lld || { echo "ERROR: ld.lld missing"; exit 1; }

      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows
        run: |
          for dir in \
            "${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows" \
            "windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          do
            if [ -d "$dir" ]; then
              find "$dir" -type f -name '*.cc' -exec perl -pi -e 's/\bwebview_\b/view/g' {} +
            fi
          done

      - name: Build Linux release
        run: flutter build linux --release --no-tree-shake-icons

      - name: Package raw bundle zip
        run: |
          set -euo pipefail
          BUNDLE="$GITHUB_WORKSPACE/build/linux/x64/release/bundle"
          [ -d "$BUNDLE" ] || { echo "ERROR: bundle missing at $BUNDLE"; exit 1; }
          cd "$BUNDLE" && zip -r "$GITHUB_WORKSPACE/${{ env.OUTPUT_NAME }}-linux.zip" .

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          APP="${{ env.APP_NAME }}"
          OUT="${{ env.OUTPUT_NAME }}"
          BUNDLE="$GITHUB_WORKSPACE/build/linux/x64/release/bundle"
          APPDIR="$GITHUB_WORKSPACE/AppDir"

          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib"
          cp -a "$BUNDLE/." "$APPDIR/usr/bin/"

          # Collect and bundle .so dependencies (excluding ABI-gated system libs)
          EXCLUDE='(libpthread|libc\.so|libdl\.so|libm\.so|librt\.so|ld-linux|ld-musl|libGL|libEGL|libvulkan|libdrm|libX|libxcb|libxkb)'
          collect_libs() {
            ldd "$1" 2>/dev/null | awk '/=>/ { print $3 }' \
              | grep -Ev '(not found|^$)' | grep -Ev "$EXCLUDE" || true
          }
          ALL="$(collect_libs "$APPDIR/usr/bin/$APP")"
          if [ -d "$BUNDLE/lib" ]; then
            while IFS= read -r so; do
              [ -f "$so" ] || continue
              MORE="$(collect_libs "$so")"
              ALL="$(printf '%s\n%s' "$ALL" "$MORE")"
            done < <(find "$BUNDLE/lib" -name '*.so*' -type f)
          fi
          echo "$ALL" | sort -u | while IFS= read -r lib; do
            [ -f "$lib" ] || continue
            dest="$APPDIR/usr/lib/$(basename "$lib")"
            [ -f "$dest" ] || { cp -L "$lib" "$dest"; echo "bundled: $(basename "$lib")"; }
          done

          # Patch RPATHs
          patchelf --set-rpath '$ORIGIN/../lib:$ORIGIN/lib' "$APPDIR/usr/bin/$APP"
          find "$APPDIR/usr/lib" -name '*.so*' -type f -print0 \
            | xargs -0 -I{} patchelf --set-rpath '$ORIGIN' {} 2>/dev/null || true

          # Write AppRun via python3 (no heredoc — heredoc bodies at col 0 break YAML parsing)
          python3 -c "
          app = '${APP}'
          lines = [
              '#!/bin/sh',
              'SELF=\$(readlink -f \"\$0\")',
              'HERE=\$(dirname \"\$SELF\")',
              'export LD_LIBRARY_PATH=\"\${HERE}/usr/lib:\${HERE}/usr/bin/lib\${LD_LIBRARY_PATH:+:\${LD_LIBRARY_PATH}}\"',
              'export XDG_DATA_DIRS=\"\${HERE}/usr/share:\${XDG_DATA_DIRS:-/usr/local/share:/usr/share}\"',
              'exec \"\${HERE}/usr/bin/' + app + '\" \"\$@\"',
          ]
          open('${APPDIR}/AppRun', 'w').write('\n'.join(lines) + '\n')
          "
          chmod +x "$APPDIR/AppRun"

          # Write .desktop via python3
          python3 -c "
          app = '${APP}'
          lines = [
              '[Desktop Entry]',
              'Type=Application',
              'Name=Convert the Spire Reborn',
              'Exec=' + app,
              'Icon=' + app,
              'Categories=AudioVideo;Audio;Video;Utility;',
              'Comment=Download, convert, play and cast media',
              'Terminal=false',
          ]
          open('${APPDIR}/' + app + '.desktop', 'w').write('\n'.join(lines) + '\n')
          "

          # Icon
          ICON="$GITHUB_WORKSPACE/assets/icons/favicon-192x192.png"
          if [ -f "$ICON" ]; then
            cp "$ICON" "$APPDIR/$APP.png"
          else
            python3 -c "
          data = bytes([0x89,0x50,0x4e,0x47,0x0d,0x0a,0x1a,0x0a,0x00,0x00,0x00,0x0d,
                        0x49,0x48,0x44,0x52,0x00,0x00,0x00,0x01,0x00,0x00,0x00,0x01,
                        0x08,0x06,0x00,0x00,0x00,0x1f,0x15,0xc4,0x89,0x00,0x00,0x00,
                        0x0a,0x49,0x44,0x41,0x54,0x78,0x9c,0x62,0x00,0x01,0x00,0x00,
                        0x05,0x00,0x01,0x0d,0x0a,0x2d,0xb4,0x00,0x00,0x00,0x00,0x49,
                        0x45,0x4e,0x44,0xae,0x42,0x60,0x82])
          open('${APPDIR}/${APP}.png', 'wb').write(data)
            "
          fi

          # Download and extract appimagetool (no FUSE needed in CI)
          curl -fsSL -o /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage
          cd /tmp && ./appimagetool.AppImage --appimage-extract
          chmod +x /tmp/squashfs-root/AppRun

          cd "$GITHUB_WORKSPACE"
          ARCH=x86_64 /tmp/squashfs-root/AppRun --no-appstream \
            "$APPDIR" "$GITHUB_WORKSPACE/${{ env.OUTPUT_NAME }}-linux.AppImage"
          ls -lh "$GITHUB_WORKSPACE/${{ env.OUTPUT_NAME }}-linux.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            ${{ env.OUTPUT_NAME }}-linux.zip
            ${{ env.OUTPUT_NAME }}-linux.AppImage
          retention-days: 30

  build-android:
    name: Build Android
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows
        run: |
          for dir in \
            "${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows" \
            "windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          do
            if [ -d "$dir" ]; then
              find "$dir" -type f -name '*.cc' -exec perl -pi -e 's/\bwebview_\b/view/g' {} +
            fi
          done

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk ${{ env.OUTPUT_NAME }}-android.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.OUTPUT_NAME }}-android.apk
          retention-days: 30

  build-macos:
    name: Build macOS
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release --no-tree-shake-icons

      - name: Package macOS app
        run: |
          APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          [ -n "$APP" ] || { echo "ERROR: .app not found"; exit 1; }
          ditto -c -k --keepParent "$APP" ${{ env.OUTPUT_NAME }}-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: ${{ env.OUTPUT_NAME }}-macOS.zip
          retention-days: 30

  release:
    name: Publish Release
    needs: [build-windows, build-linux, build-android, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.release_tag || format('v0.0.{0}', github.run_number) }}
          name: ${{ inputs.release_name || inputs.release_tag || format('Build {0}', github.run_number) }}
          generate_release_notes: true
          files: |
            artifacts/windows-x64/${{ env.OUTPUT_NAME }}-windows.zip
            artifacts/linux-x64/${{ env.OUTPUT_NAME }}-linux.AppImage
            artifacts/linux-x64/${{ env.OUTPUT_NAME }}-linux.zip
            artifacts/android-apk/${{ env.OUTPUT_NAME }}-android.apk
            artifacts/macos-x64/${{ env.OUTPUT_NAME }}-macOS.zip