name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v3.0.3). Leave empty to auto-generate.'
        required: false
      release_name:
        description: 'Release name. Leave empty to use tag.'
        required: false

permissions:
  contents: write

jobs:
  # ── Code Quality Gate ────────────────────────────────────────────────
  analyze:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: |
          if [ -d "test" ] && find test -name "*_test.dart" -print -quit | grep -q .; then
            flutter test
          else
            echo "No test files found - skipping tests"
          fi

  # ── Windows Build ─────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: analyze
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows
        shell: pwsh
        run: |
          $dirs = @(
            "$env:PUB_CACHE\hosted\pub.dev\flutter_inappwebview_windows-0.6.0\windows",
            "windows\flutter\ephemeral\.plugin_symlinks\flutter_inappwebview_windows\windows"
          )
          foreach ($dir in $dirs) {
            if (Test-Path $dir) {
              Get-ChildItem $dir -Recurse -Filter *.cc | ForEach-Object {
                (Get-Content $_.FullName) -replace '\bwebview_\b','view' |
                  Set-Content $_.FullName
              }
            }
          }

      - name: Build Windows release (with retry)
        shell: pwsh
        run: |
          $attempt = 0
          $max = 2
          while ($attempt -lt $max) {
            Write-Host "Windows build attempt $($attempt + 1) of $max"
            try {
              flutter build windows --release --no-tree-shake-icons
              break
            } catch {
              Write-Host "Build failed: $_"
              $attempt++
              if ($attempt -lt $max) {
                Write-Host "Retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                throw
              }
            }
          }

      - name: Package Windows release
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $zip = "ConvertTheSpireReborn.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force
          Write-Host "Created $zip ($([math]::Round((Get-Item $zip).Length/1MB,1)) MB)"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ConvertTheSpireReborn.zip
          retention-days: 30

  # ── Linux Build ───────────────────────────────────────────────────────
  # Runs inside ubuntu:20.04 so the binary only requires GLIBC <= 2.31.
  # The bare container is missing jq (needed by setup-flutter to parse the
  # release manifest) — it must be installed before setup-flutter runs.
  # Git safe.directory must also be set before Flutter setup because the
  # runner extracts files under a different UID than the container user.
  build-linux:
    name: Build Linux
    needs: analyze
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      # Git >= 2.35.2 rejects repos owned by a different UID.
      # We write the gitconfig directly because git is not yet installed
      # in the bare ubuntu:20.04 image at this point — apt-get hasn't run.
      - name: Trust all git directories (container UID mismatch fix)
        run: printf '[safe]\n\tdirectory = *\n' > "$HOME/.gitconfig"

      # jq must be installed here — it is not in the bare ubuntu:20.04 image
      # and flutter-actions/setup-flutter needs it to parse the release manifest.
      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl git unzip xz-utils zip jq \
            clang lld binutils cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libmpv-dev mpv libass-dev \
            libayatana-appindicator3-dev libappindicator3-dev \
            patchelf ca-certificates

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows
        run: |
          for dir in \
            "${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows" \
            "windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          do
            if [ -d "$dir" ]; then
              find "$dir" -type f -name '*.cc' -exec sed -i 's/\bwebview_\b/view/g' {} +
            fi
          done

      - name: Build Linux release
        run: flutter build linux --release --no-tree-shake-icons

      - name: Copy launcher into bundle
        run: |
          BUNDLE_DIR="build/linux/x64/release/bundle"
          cp linux/convert_the_spire.sh "$BUNDLE_DIR/"
          chmod +x "$BUNDLE_DIR/convert_the_spire.sh"

      - name: Verify no missing shared libs
        run: |
          BIN="build/linux/x64/release/bundle/convert_the_spire_reborn"
          apt-get install -y --no-install-recommends \
            libgtk-3-0 libglib2.0-0 libgdk-pixbuf2.0-0 \
            libpango-1.0-0 libcairo2 libatk1.0-0 libharfbuzz0b \
            libmpv1 libayatana-appindicator3-1 libepoxy0
          MISSING=$(ldd "$BIN" | grep "not found" || true)
          if [ -n "$MISSING" ]; then
            echo "ERROR: missing libraries:"
            echo "$MISSING"
            exit 1
          fi
          echo "All shared libraries resolved OK"

      - name: Archive Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/linux.zip" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: linux.zip
          retention-days: 30

  # ── Android Build ─────────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_windows
        run: |
          for dir in \
            "${PUB_CACHE:-$HOME/.pub-cache}/hosted/pub.dev/flutter_inappwebview_windows-0.6.0/windows" \
            "windows/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_windows/windows"
          do
            if [ -d "$dir" ]; then
              find "$dir" -type f -name '*.cc' -exec sed -i 's/\bwebview_\b/view/g' {} +
            fi
          done

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk ConvertTheSpireReborn.apk
          ls -lh ConvertTheSpireReborn.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ConvertTheSpireReborn.apk
          retention-days: 30

  # ── macOS Build ───────────────────────────────────────────────────────
  # macos-latest runners include Xcode, CocoaPods, and the full Apple
  # toolchain — no extra setup needed beyond Flutter itself.
  build-macos:
    name: Build macOS
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: '3.41.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release --no-tree-shake-icons

      - name: Package macOS app
        run: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: .app bundle not found" && exit 1
          fi
          echo "Packaging: $APP"
          ditto -c -k --keepParent "$APP" ConvertTheSpireReborn-macOS.zip
          ls -lh ConvertTheSpireReborn-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: ConvertTheSpireReborn-macOS.zip
          retention-days: 30

  # ── Create GitHub Release ─────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-linux, build-android, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name || format('v0.0.{0}', github.run_number) }}
          name: ${{ inputs.release_name || inputs.release_tag || github.ref_name || format('Build {0}', github.run_number) }}
          generate_release_notes: true
          files: |
            artifacts/windows-x64/ConvertTheSpireReborn.zip
            artifacts/linux-x64/linux.zip
            artifacts/android-apk/ConvertTheSpireReborn.apk
            artifacts/macos-x64/ConvertTheSpireReborn-macOS.zip